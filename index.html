<!DOCTYPE html>
<html>
<head>
  <title>Global AI Chatbot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .chat-box {
      width: 400px;
      height: 560px;
      background: #1e1e1e;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0,255,120,0.3);
    }

    .header {
      padding: 10px;
      background: #00c853;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }

    select {
      padding: 5px;
      border-radius: 5px;
      border: none;
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      margin: 6px 0;
    }

    .typing {
      font-size: 12px;
      opacity: 0.7;
      padding-left: 10px;
    }

    .input-box {
      display: flex;
      border-top: 1px solid #333;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px;
      background: #00c853;
      border: none;
      color: white;
      cursor: pointer;
    }

    .mic {
      background: #ff9800;
    }
  </style>
</head>

<body>

<div class="chat-box">

  <!-- HEADER -->
  <div class="header">
    🤖 Global AI
    <select id="lang">
      <option value="auto">🌍 Auto</option>
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="ar">Arabic</option>
      <option value="ru">Russian</option>
      <option value="zh">Chinese</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="pt">Portuguese</option>
    </select>
  </div>

  <!-- CHAT -->
  <div id="chat"></div>

  <div class="typing" id="typing"></div>

  <!-- INPUT -->
  <div class="input-box">
    <input id="input" placeholder="Type or speak..." />
    <button class="mic" onclick="startVoice()">🎤</button>
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
async function sendMessage() {
  const inputEl = document.getElementById("input");
  const input = inputEl.value.trim();
  const chat = document.getElementById("chat");
  const lang = document.getElementById("lang").value;

  if (!input) return;

  chat.innerHTML += `<div class="msg"><b>You:</b> ${input}</div>`;
  inputEl.value = "";

  document.getElementById("typing").innerText = "AI is typing... ⏳";

  const res = await fetch("/api/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt: input, lang: lang })
  });

  const data = await res.json();

  document.getElementById("typing").innerText = "";

  chat.innerHTML += `<div class="msg"><b>Bot:</b> ${data.reply || data.error}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

/* 🎤 VOICE INPUT */
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    document.getElementById("input").value = event.results[0][0].transcript;
  };

  recognition.start();
}
</script>

</body>
</html>
