<!DOCTYPE html>
<html>
<head>
<title>AI Tools Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:#fff;
}

/* HEADER */
header{
display:flex;
flex-wrap:wrap;
padding:10px;
background:#111;
}

header button{
margin:3px;
padding:10px;
border:none;
background:#222;
color:#fff;
border-radius:6px;
cursor:pointer;
}

/* ACTIVE BUTTON */
header button.active{
background:#00c3ff;
color:#000;
}

/* TOOLS */
.tool{
display:none;
padding:10px;
background:#1a1a1a;
margin:10px;
border-radius:10px;
}

.tool.active{
display:block;
}

/* CHAT */
#chatbox{
height:300px;
overflow:auto;
background:#000;
padding:10px;
border-radius:10px;
}

.msg{
padding:10px;
margin:5px;
border-radius:10px;
max-width:80%;
}

.user{background:#007bff;margin-left:auto;}
.bot{background:#333;}

/* INPUT */
input, textarea{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
}

/* IMAGE PREVIEW */
#preview{
max-width:100%;
margin-top:10px;
border-radius:10px;
}

/* MOBILE FIX */
@media(max-width:768px){
.tool{display:none !important;}
.tool.active{display:block !important;}
}

</style>
</head>

<body>

<header>
<button onclick="showTool('chat',this)" class="active">Chat</button>
<button onclick="showTool('translate',this)">Translate</button>
<button onclick="showTool('blog',this)">Blog</button>
<button onclick="showTool('image',this)">Image</button>
<button onclick="showTool('pdf',this)">PDF</button>
<button onclick="showTool('seo',this)">🔥 SEO</button>
</header>

<!-- CHAT -->
<div id="chat" class="tool active">
<h2>Chat</h2>
<div id="chatbox"></div>
<input id="msg" placeholder="Type...">
<button onclick="send()">Send</button>
</div>

<!-- TRANSLATE -->
<div id="translate" class="tool">
<h2>Translate</h2>
<textarea id="transText"></textarea>
<button onclick="translate()">Translate</button>
<p id="transResult"></p>
</div>

<!-- BLOG -->
<div id="blog" class="tool">
<h2>Blog</h2>
<input id="blogTopic">
<button onclick="blog()">Generate</button>
<p id="blogResult"></p>
</div>

<!-- IMAGE TOOL -->
<div id="image" class="tool">
<h2>Image Editor 🔥</h2>

<input type="file" onchange="loadImage(event)">

<br><br>

<button onclick="applyEffect('grayscale')">Grayscale</button>
<button onclick="applyEffect('blur')">Blur</button>
<button onclick="applyEffect('brightness')">Bright</button>

<img id="preview">
</div>

<!-- PDF -->
<div id="pdf" class="tool">
<h2>PDF Tool</h2>
<input type="file">
<p>Upload PDF (next update me full feature milega)</p>
</div>

<!-- SEO -->
<div id="seo" class="tool">
<h2>SEO Tool</h2>

<input id="title" placeholder="Title">
<textarea id="desc"></textarea>

<button onclick="seo()">Generate</button>
<p id="seoResult"></p>
</div>

<script>

/* TOOL SWITCH */
function showTool(id,btn){
document.querySelectorAll(".tool").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll("header button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

/* CHAT */
async function send(){
let msg=document.getElementById("msg").value;
let box=document.getElementById("chatbox");

box.innerHTML+=`<div class="msg user">${msg}</div>`;

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:msg})
});

let data=await res.json();

box.innerHTML+=`<div class="msg bot">${data.reply}</div>`;
}

/* TRANSLATE */
function translate(){
let t=document.getElementById("transText").value;
document.getElementById("transResult").innerText="Translated: "+t;
}

/* BLOG */
function blog(){
let t=document.getElementById("blogTopic").value;
document.getElementById("blogResult").innerText="Blog on "+t;
}

/* SEO */
function seo(){
let t=document.getElementById("title").value;

document.getElementById("seoResult").innerText=
"Title: "+t+"\n\n#"+t.replaceAll(" ","")+" #viral #trending";
}

/* IMAGE TOOL */
let img=document.getElementById("preview");

function loadImage(e){
img.src=URL.createObjectURL(e.target.files[0]);
}

function applyEffect(type){
if(type==="grayscale") img.style.filter="grayscale(100%)";
if(type==="blur") img.style.filter="blur(5px)";
if(type==="brightness") img.style.filter="brightness(150%)";
}

</script>

</body>
</html>
