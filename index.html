<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Tools Hub Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff}

header{display:flex;gap:5px;padding:10px;background:#111}
header button{flex:1;padding:10px;background:#00c853;border:none;border-radius:6px;color:#000;font-weight:bold}

.container{padding:10px}
.tool{display:none;background:#1e1e1e;padding:15px;border-radius:10px}
.active{display:block}

input,textarea,select{
width:100%;padding:10px;margin-top:10px;border-radius:6px;border:none
}

/* CHATBOX GLOW */
#chatbox{
height:400px;overflow-y:auto;background:#0f0f0f;padding:10px;border-radius:10px;
border:2px solid transparent;
background-image:linear-gradient(#0f0f0f,#0f0f0f),
linear-gradient(45deg,#00ffcc,#00c853,#00ffcc);
background-origin:border-box;
background-clip:padding-box,border-box;
animation:glow 3s linear infinite;
}

@keyframes glow{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(360deg)}
}

/* MESSAGE */
.msg{padding:10px;margin:5px 0;border-radius:10px;max-width:80%}
.user{background:#00c853;color:#000;margin-left:auto}
.bot{background:#1e1e1e;color:#fff;line-height:1.6}

/* FORMAT STYLE */
.bot h1,.bot h2{color:#00ffcc;margin:10px 0}
.bot ul{padding-left:20px}
.bot li{margin:5px 0}
.bot code{background:#000;padding:4px;border-radius:5px;color:#00ffcc}
.bot hr{border:0;border-top:1px solid #333;margin:10px 0}

/* POPUP */
#loadingPopup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;padding:20px 30px;border-radius:10px;
display:none;color:#00ffcc;font-weight:bold;
box-shadow:0 0 20px #00ffcc;
}

/* TYPING DOTS */
.typing{display:flex;gap:5px}
.typing span{
width:8px;height:8px;background:#00ffcc;border-radius:50%;
animation:blink 1.5s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}

@keyframes blink{
0%,100%{opacity:0.2}
50%{opacity:1}
}
</style>
</head>

<body>

<header>
<button onclick="show('chat')">Chat</button>
<button onclick="show('trans')">Translate</button>
</header>

<div id="loadingPopup">🔍 AI is thinking...</div>

<div class="container">

<!-- CHAT -->
<div id="chat" class="tool active">
<h2>AI Chat</h2>

<select id="lang">
<option value="auto">Auto</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
</select>

<div id="chatbox"></div>

<input id="input" placeholder="Type message...">

<button onclick="sendChat()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>
<button onclick="stopVoice()">⛔ Stop</button>
</div>

<!-- TRANSLATE -->
<div id="trans" class="tool">
<h2>Translate</h2>

<input id="text" placeholder="Type text">

<select id="lang2">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="mr">Marathi</option>
<option value="pa">Punjabi</option>
<option value="bn">Bengali</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="ur">Urdu</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
</select>

<button onclick="translateText()">Translate</button>

<hr>

<input type="file" accept="image/*" onchange="readImage(event)">
<p id="ocrText"></p>
<div id="out"></div>
</div>

</div>

<script>

/* SWITCH */
function show(id){
document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* FORMAT RESPONSE */
function formatReply(text){
return text
.replace(/\n/g,"<br>")
.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")
.replace(/## (.*?)<br>/g,"<h2>$1</h2>")
.replace(/# (.*?)<br>/g,"<h1>$1</h1>")
.replace(/- (.*?)<br>/g,"<li>$1</li>")
.replace(/(<li>.*<\/li>)/g,"<ul>$1</ul>");
}

/* MEMORY */
let history=JSON.parse(localStorage.getItem("chatHistory")||"[]");

function loadHistory(){
history.forEach(m=>{
let html=m.type==="bot"?formatReply(m.text):m.text;
chatbox.innerHTML+=`<div class="msg ${m.type}">${html}</div>`;
});
}
loadHistory();

/* CHAT */
async function sendChat(){
let input=document.getElementById("input");
let text=input.value.trim();
if(!text) return;

chatbox.innerHTML+=`<div class="msg user">${text}</div>`;
history.push({type:"user",text});
localStorage.setItem("chatHistory",JSON.stringify(history));

input.value="";
loadingPopup.style.display="block";

let id="t"+Date.now();
chatbox.innerHTML+=`<div id="${id}" class="msg bot"><div class="typing"><span></span><span></span><span></span></div></div>`;

let res=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:text+" format nicely with headings and emojis",lang:lang.value})});

let d=await res.json();

document.getElementById(id).remove();
loadingPopup.style.display="none";

let formatted=formatReply(d.reply);

chatbox.innerHTML+=`<div class="msg bot">${formatted}</div>`;
history.push({type:"bot",text:d.reply});
localStorage.setItem("chatHistory",JSON.stringify(history));

speak(d.reply);
}

/* ENTER FIX */
input.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault();sendChat();
}
});

text.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();translateText();
}
});

/* VOICE */
let recognition;
function startVoice(){
recognition=new webkitSpeechRecognition();
recognition.onresult=e=>{
input.value=e.results[0][0].transcript;
sendChat();
};
recognition.start();
}
function stopVoice(){if(recognition)recognition.stop();}
function speak(t){speechSynthesis.speak(new SpeechSynthesisUtterance(t));}

/* TRANSLATE */
async function translateText(){
let t=text.value;
let l=lang2.value;

let res=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:`Translate to ${l}: ${t}`})});

let d=await res.json();
out.innerHTML=d.reply;
}

/* OCR */
async function readImage(e){
let f=e.target.files[0];
let r=await Tesseract.recognize(f,"eng+hin");
ocrText.innerText=r.data.text;

let res=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:`Translate: ${r.data.text}`})});

let d=await res.json();
out.innerHTML=d.reply;
}

</script>

</body>
</html>
