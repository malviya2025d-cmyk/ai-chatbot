<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSearch AI Chat</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  background: url("background.jpg") no-repeat center center/cover;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  overflow: hidden;
}

/* Top Logo */
.logo {
  position: absolute;
  top: 15px;
  font-size: 28px;
  font-weight: bold;
  color: #00e5ff;
  text-shadow: 0 0 10px #00e5ff;
}

/* Chat Box */
.chat-container {
  width: 360px;
  height: 500px;
  background: rgba(0,0,0,0.6);
  border: 2px solid #00e5ff;
  border-radius: 15px;
  box-shadow: 0 0 20px #00e5ff;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Spark Animation */
.chat-container::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,229,255,0.3), transparent 70%);
  animation: move 4s linear infinite;
}

@keyframes move {
  0% {transform: translate(-50%, -50%);}
  50% {transform: translate(0%, 0%);}
  100% {transform: translate(-50%, -50%);}
}

/* Chat messages */
.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  z-index: 2;
}

.msg {
  margin: 5px 0;
  padding: 8px;
  border-radius: 10px;
  max-width: 80%;
}

.user {
  background: #00e5ff;
  color: black;
  align-self: flex-end;
}

.bot {
  background: #222;
  align-self: flex-start;
}

/* Input */
.input-box {
  display: flex;
  border-top: 1px solid #00e5ff;
  z-index: 2;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

button {
  background: #00e5ff;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  font-weight: bold;
}

/* Bottom text */
.footer {
  position: absolute;
  bottom: 70px;
  text-align: center;
  font-size: 13px;
  width: 80%;
  opacity: 0.8;
}

/* Social icons */
.social {
  position: absolute;
  bottom: 20px;
  display: flex;
  gap: 15px;
}

.social a {
  color: white;
  font-size: 22px;
  transition: 0.3s;
}

.social a:hover {
  transform: scale(1.3);
  color: #00e5ff;
}
</style>
</head>

<body>

<div class="logo">🔷 DeepSearch AI</div>

<div class="chat-container">
  <div class="messages" id="messages"></div>

  <div class="input-box">
    <input id="input" placeholder="Type your message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<div class="footer">
  Welcome to DeepSearch AI – Your smart AI assistant powered by Groq API.
</div>

<div class="social">
  <a href="#">🔵</a>
  <a href="#">🐦</a>
  <a href="#">📸</a>
  <a href="#">💼</a>
</div>

<script>
async function send() {
  let input = document.getElementById("input");
  let msg = input.value;
  if (!msg) return;

  addMessage(msg, "user");
  input.value = "";

  addMessage("Thinking...", "bot");

  let res = await fetch("/api/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt: msg })
  });

  let data = await res.json();

  document.querySelector(".bot:last-child").remove();
  addMessage(data.reply || "No response", "bot");
}

function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
  div.scrollIntoView();
}
</script>

</body>
</html>
