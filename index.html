<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>AI Tools Hub Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-E48LS72B74"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-E48LS72B74');
</script>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8334252996051264" crossorigin="anonymous"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family: Arial, "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
background:#0f0f0f;
color:#fff;
}

header{
display:flex;
flex-wrap:wrap;
gap:5px;
padding:10px;
background:#111;
}

header button{
flex:1;
padding:10px;
background:#00c853;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.container{padding:10px;}

.tool{
display:none;
background:#1e1e1e;
padding:15px;
border-radius:10px;
}

.active{display:block;}

input,textarea,select{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

#chatbox{
height:420px;
overflow-y:auto;
background:#0f0f0f;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
border-radius:10px;
}

.msg{
padding:12px 16px;
border-radius:12px;
max-width:80%;
line-height:1.5;
font-size:15px;
animation:fadeIn 0.3s ease;
position:relative;
}

.user{
background:#00c853;
color:#000;
align-self:flex-end;
border-bottom-right-radius:4px;
}

.bot{
background:#1e1e1e;
align-self:flex-start;
border-bottom-left-radius:4px;
}

.copyBtn{
position:absolute;
right:6px;
bottom:6px;
font-size:12px;
cursor:pointer;
color:#aaa;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

canvas{
width:100%;
margin-top:10px;
border-radius:10px;
}
</style>

</head>

<body>

<header>
<button onclick="show('chat')">Chat</button>
<button onclick="show('blog')">Blog</button>
<button onclick="show('trans')">Translate</button>
<button onclick="show('pdf')">PDF</button>
<button onclick="show('img')">Image</button>
</header>

<div class="container">

<!-- CHAT -->
<div id="chat" class="tool active">
<h2>AI Chat</h2>

<select id="lang">
<option value="auto">Auto</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="ru">Russian</option>
<option value="zh">Chinese</option>
<option value="ar">Arabic</option>
</select>

<div id="chatbox"></div>

<input id="input" placeholder="Type message..." />
<button onclick="sendChat()">Send</button>
</div>

<!-- BLOG -->
<div id="blog" class="tool">
<h2>Blog Generator</h2>
<input id="blogInput" placeholder="Topic...">
<button onclick="generateBlog()">Generate</button>
<div id="blogOut"></div>
</div>

<!-- TRANSLATE -->
<div id="trans" class="tool">
<h2>Translate</h2>
<input id="text">
<select id="lang2">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
</select>
<button onclick="translateText()">Translate</button>
<div id="out"></div>
</div>

<!-- PDF -->
<div id="pdf" class="tool">
<h2>PDF Tool</h2>
<input type="file" accept="image/*" onchange="addImagePDF(event)">
<textarea id="pdfText"></textarea>
<button onclick="makePDF()">Download PDF</button>
</div>

<!-- IMAGE -->
<div id="img" class="tool">
<h2>Image Tool</h2>
<input type="file" accept="image/*" onchange="loadImg(event)">
<button onclick="gray()">Gray</button>
<button onclick="invert()">Invert</button>
<button onclick="rotate()">Rotate</button>
<button onclick="downloadImg()">Download</button>
<canvas id="c"></canvas>
</div>

</div>

<script>

/* SWITCH */
function show(id){
document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* CHAT */
let memory=[];
const input=document.getElementById("input");
const chatbox=document.getElementById("chatbox");

window.onload=()=>{
let old=localStorage.getItem("chat");
if(old) chatbox.innerHTML=old;
};

input.addEventListener("keypress",e=>{
if(e.key==="Enter") sendChat();
});

function saveChat(){
localStorage.setItem("chat",chatbox.innerHTML);
}

async function sendChat(){

let text=input.value.trim();
if(!text) return;

memory.push(text);
if(memory.length>5) memory.shift();

chatbox.innerHTML+=`<div class="msg user">${text}</div>`;
input.value="";

let typing=document.createElement("div");
typing.className="msg bot";
typing.innerHTML="Typing...";
chatbox.appendChild(typing);

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
prompt: memory.join("\n") + "\nUser: " + text,
lang: document.getElementById("lang").value
})
});

let data=await res.json();

typing.remove();

let msg=document.createElement("div");
msg.className="msg bot";
msg.innerHTML=`${data.reply} <span class="copyBtn" onclick="copyText(this)">📋</span>`;

chatbox.appendChild(msg);

saveChat();
chatbox.scrollTop=chatbox.scrollHeight;
}

function copyText(el){
let text=el.parentElement.innerText.replace("📋","");
navigator.clipboard.writeText(text);
}

/* BLOG */
async function generateBlog(){
let t=document.getElementById("blogInput").value;

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
prompt:`Write SEO blog in ${document.getElementById("lang").value}: `+t
})
});

let d=await res.json();
document.getElementById("blogOut").innerHTML=d.reply;
}

/* TRANSLATE */
async function translateText(){
let t=document.getElementById("text").value;
let l=document.getElementById("lang2").value;

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
prompt:`Translate to ${l}: ${t}`
})
});

let d=await res.json();
document.getElementById("out").innerHTML=d.reply;
}

/* PDF */
let pdfImg=null;
function addImagePDF(e){
let r=new FileReader();
r.onload=()=>pdfImg=r.result;
r.readAsDataURL(e.target.files[0]);
}

function makePDF(){
const { jsPDF }=window.jspdf;
let doc=new jsPDF();
doc.text(document.getElementById("pdfText").value,10,10);
if(pdfImg) doc.addImage(pdfImg,"JPEG",10,30,180,100);
doc.save("file.pdf");
}

/* IMAGE */
let c=document.getElementById("c");
let ctx=c.getContext("2d");
let img=new Image();

function loadImg(e){
let r=new FileReader();
r.onload=()=>img.src=r.result;
img.onload=()=>{c.width=300;c.height=300;ctx.drawImage(img,0,0,300,300);}
r.readAsDataURL(e.target.files[0]);
}

function gray(){
let d=ctx.getImageData(0,0,c.width,c.height);
let a=d.data;
for(let i=0;i<a.length;i+=4){
let g=(a[i]+a[i+1]+a[i+2])/3;
a[i]=a[i+1]=a[i+2]=g;
}
ctx.putImageData(d,0,0);
}

function invert(){
let d=ctx.getImageData(0,0,c.width,c.height);
let a=d.data;
for(let i=0;i<a.length;i+=4){
a[i]=255-a[i];
a[i+1]=255-a[i+1];
a[i+2]=255-a[i+2];
}
ctx.putImageData(d,0,0);
}

function rotate(){
ctx.translate(c.width/2,c.height/2);
ctx.rotate(Math.PI/2);
ctx.drawImage(img,-150,-150,300,300);
}

function downloadImg(){
let a=document.createElement("a");
a.href=c.toDataURL();
a.download="image.png";
a.click();
}

</script>

</body>
</html>
