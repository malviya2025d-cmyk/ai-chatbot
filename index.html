<script>
async function send() {
  let input = document.getElementById("input");
  let msg = input.value;
  if (!msg) return;

  addMessage(msg, "user");
  input.value = "";

  let thinking = addMessage("Thinking...", "bot");

  try {
    let res = await fetch("YOUR_API_URL_HERE", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer YOUR_API_KEY"
      },
      body: JSON.stringify({
        model: "llama3-70b-8192", // Groq / OpenAI style
        messages: [
          { role: "user", content: msg }
        ]
      })
    });

    let data = await res.json();

    thinking.remove();

    let reply =
      data.choices?.[0]?.message?.content ||
      data.reply ||
      "No response";

    addMessage(reply, "bot");

  } catch (err) {
    thinking.remove();
    addMessage("Error: API not working", "bot");
    console.error(err);
  }
}

function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
  div.scrollIntoView();
  return div;
}
</script>
