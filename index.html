<!DOCTYPE html>
<html>
<head>
<title>AI Tools Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌙 BODY */
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:#fff;
}

/* 🔝 HEADER */
header{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:10px;
background:#111;
}

header button{
flex:1;
min-width:80px;
margin:3px;
padding:10px;
border:none;
background:#222;
color:#fff;
border-radius:6px;
cursor:pointer;
}

header button.active{
background:#00c3ff;
color:#000;
}

/* 📦 TOOL BOX */
.tool{
display:none;
padding:10px;
background:#1a1a1a;
margin:10px;
border-radius:10px;
}

.tool.active{
display:block;
}

/* 💬 CHAT */
#chatbox{
height:300px;
overflow:auto;
background:#000;
padding:10px;
border-radius:10px;
}

.msg{
padding:10px;
margin:5px;
border-radius:10px;
max-width:80%;
}

.user{background:#007bff;margin-left:auto;}
.bot{background:#333;}

/* 🧾 INPUT */
input, textarea{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
font-size:16px;
}

button{
margin-top:5px;
}

/* 📸 IMAGE */
#preview{
max-width:100%;
margin-top:10px;
border-radius:10px;
}

/* 🔗 SHARE BUTTONS */
.share{
display:flex;
gap:5px;
flex-wrap:wrap;
margin:10px;
}

.share button{
flex:1;
background:#444;
}

</style>
</head>

<body>

<header>
<button onclick="showTool('chat',this)" class="active">Chat</button>
<button onclick="showTool('translate',this)">Translate</button>
<button onclick="showTool('blog',this)">Blog</button>
<button onclick="showTool('image',this)">Image</button>
<button onclick="showTool('seo',this)">SEO</button>
</header>

<!-- 🔗 SHARE -->
<div class="share">
<button onclick="shareWhatsApp()">WhatsApp</button>
<button onclick="shareFacebook()">Facebook</button>
<button onclick="shareTwitter()">Twitter</button>
<button onclick="copyLink()">Copy Link</button>
</div>

<!-- 💬 CHAT -->
<div id="chat" class="tool active">
<h2>Chat</h2>
<div id="chatbox"></div>
<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>
</div>

<!-- 🌐 TRANSLATE -->
<div id="translate" class="tool">
<h2>Translate</h2>
<textarea id="transText"></textarea>
<button onclick="translate()">Translate</button>
<p id="transResult"></p>
</div>

<!-- ✍️ BLOG -->
<div id="blog" class="tool">
<h2>Blog Generator</h2>
<input id="blogTopic" placeholder="Enter topic">
<button onclick="blog()">Generate</button>
<p id="blogResult"></p>
</div>

<!-- 🖼 IMAGE -->
<div id="image" class="tool">
<h2>Image Editor</h2>
<input type="file" onchange="loadImage(event)">
<br><br>
<button onclick="applyEffect('grayscale')">Grayscale</button>
<button onclick="applyEffect('blur')">Blur</button>
<button onclick="applyEffect('brightness')">Bright</button>
<img id="preview">
</div>

<!-- 🔥 SEO -->
<div id="seo" class="tool">
<h2>SEO Tool</h2>
<input id="title" placeholder="Enter Title">
<textarea id="desc" placeholder="Enter Description"></textarea>
<button onclick="seo()">Generate</button>
<p id="seoResult"></p>
</div>

<script>

/* 🔄 TOOL SWITCH */
function showTool(id,btn){
document.querySelectorAll(".tool").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll("header button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

/* 💬 ENTER KEY */
document.getElementById("msg").addEventListener("keypress",function(e){
if(e.key==="Enter"){
send();
}
});

/* 🤖 CHAT */
async function send(){
let msg=document.getElementById("msg").value;
let box=document.getElementById("chatbox");

box.innerHTML+=`<div class="msg user">${msg}</div>`;

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:msg})
});

let data=await res.json();

box.innerHTML+=`<div class="msg bot">😊 ${data.reply}</div>`;
}

/* 🌐 TRANSLATE */
async function translate(){
let t=document.getElementById("transText").value;

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:`Translate: ${t}`})
});

let data=await res.json();

document.getElementById("transResult").innerText=data.reply;
}

/* ✍️ BLOG */
async function blog(){
let t=document.getElementById("blogTopic").value;

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:`Write blog on: ${t}`})
});

let data=await res.json();

document.getElementById("blogResult").innerText=data.reply;
}

/* 🔥 SEO */
function seo(){
let t=document.getElementById("title").value;

document.getElementById("seoResult").innerText=
`Title: ${t}

#${t.replaceAll(" ","")} #viral #trending`;
}

/* 🖼 IMAGE */
let img=document.getElementById("preview");

function loadImage(e){
img.src=URL.createObjectURL(e.target.files[0]);
}

function applyEffect(type){
if(type==="grayscale") img.style.filter="grayscale(100%)";
if(type==="blur") img.style.filter="blur(5px)";
if(type==="brightness") img.style.filter="brightness(150%)";
}

/* 🔗 SHARE */
function shareWhatsApp(){
window.open(`https://wa.me/?text=${location.href}`);
}

function shareFacebook(){
window.open(`https://www.facebook.com/sharer/sharer.php?u=${location.href}`);
}

function shareTwitter(){
window.open(`https://twitter.com/intent/tweet?url=${location.href}`);
}

function copyLink(){
navigator.clipboard.writeText(location.href);
alert("Link copied!");
}

</script>

</body>
</html>
