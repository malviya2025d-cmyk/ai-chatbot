<script>

/* TOOL SWITCH */
function showTool(id,btn){
document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('header button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

/* DOM LOAD FIX */
window.addEventListener("DOMContentLoaded",()=>{

const msgInput = document.getElementById("msg");
const chatbox = document.getElementById("chatbox");

/* ENTER KEY */
msgInput.addEventListener("keydown",function(e){
if(e.key==="Enter"){
e.preventDefault();
send();
}
});

/* LOAD OLD CHAT */
let old = localStorage.getItem("chat");
if(old) chatbox.innerHTML = old;

});

/* CHAT SEND */
async function send(){

const msgInput = document.getElementById("msg");
const chatbox = document.getElementById("chatbox");

let msg = msgInput.value.trim();
if(!msg) return;

chatbox.innerHTML += `<div class="msg user">🧑 ${msg}</div>`;
msgInput.value = "";

chatbox.innerHTML += `<div class="msg bot">🤖 Typing...</div>`;

try{

let res = await fetch("/api/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:msg})
});

let data = await res.json();

/* DEBUG */
console.log(data);

/* SAFE RESPONSE */
let reply = data?.choices?.[0]?.message?.content;

if(!reply){
chatbox.lastChild.innerHTML="❌ No reply (check API)";
return;
}

chatbox.lastChild.innerHTML = "🤖 " + reply;

/* SAVE CHAT */
localStorage.setItem("chat",chatbox.innerHTML);

/* VOICE */
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(reply));

}catch(err){
chatbox.lastChild.innerHTML="❌ Server Error";
console.error(err);
}

chatbox.scrollTop = chatbox.scrollHeight;
}

/* CLEAR CHAT */
function clearChat(){
localStorage.removeItem("chat");
document.getElementById("chatbox").innerHTML="";
}

/* VOICE INPUT */
function startVoice(){
try{
let rec = new(window.SpeechRecognition||window.webkitSpeechRecognition)();

rec.onresult = (e)=>{
document.getElementById("msg").value = e.results[0][0].transcript;
send();
};

rec.start();

}catch{
alert("Mic not supported");
}
}

</script>
