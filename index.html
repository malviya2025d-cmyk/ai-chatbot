<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .chat-box {
      width: 380px;
      height: 520px;
      background: #1e1e1e;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,255,120,0.3);
    }

    .header {
      padding: 10px;
      background: #00c853;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    select {
      padding: 5px;
      border-radius: 5px;
      border: none;
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      margin: 6px 0;
    }

    .input-box {
      display: flex;
      border-top: 1px solid #333;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px;
      background: #00c853;
      border: none;
      color: white;
      cursor: pointer;
    }

    .typing {
      font-size: 12px;
      opacity: 0.7;
      margin-left: 10px;
    }
  </style>
</head>

<body>

<div class="chat-box">

  <!-- HEADER -->
  <div class="header">
    🤖 AI Chatbot
    <select id="lang">
      <option value="english">English</option>
      <option value="hindi">Hindi</option>
    </select>
  </div>

  <!-- CHAT -->
  <div id="chat"></div>

  <div id="typing" class="typing"></div>

  <!-- INPUT -->
  <div class="input-box">
    <input id="input" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
async function sendMessage() {
  const inputEl = document.getElementById("input");
  const input = inputEl.value.trim();
  const chat = document.getElementById("chat");
  const typing = document.getElementById("typing");
  const lang = document.getElementById("lang").value;

  if (!input) return;

  chat.innerHTML += `<div class="msg"><b>You:</b> ${input}</div>`;
  inputEl.value = "";

  typing.innerText = "AI is typing... ⏳";

  const res = await fetch("/api/ai", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      prompt: input,
      lang: lang
    })
  });

  const data = await res.json();

  typing.innerText = "";

  if (data.error) {
    chat.innerHTML += `<div class="msg"><b>Bot:</b> ${data.error}</div>`;
  } else {
    chat.innerHTML += `<div class="msg"><b>Bot:</b> ${data.reply}</div>`;
  }

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
