<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Tools Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>
body{font-family:sans-serif;margin:0;background:#111;color:#fff}
header{display:flex;overflow:auto;background:#000}
header button{flex:1;padding:10px;border:none;background:#000;color:#fff}
header button.active{background:#444}
.tool{display:none;padding:15px}
.tool.active{display:block}
input,textarea,select{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
button{padding:10px;border:none;border-radius:8px;margin:5px 0;background:#00c3ff;color:#000}
#chatbox{height:300px;overflow:auto;background:#222;padding:10px;border-radius:10px}
.msg{margin:5px 0;padding:8px;border-radius:8px}
.user{background:#0084ff}
.bot{background:#444}
.share{display:flex;gap:5px;padding:10px}
canvas{width:100%;background:#000;margin-top:10px}
</style>

</head>

<body>

<header>
<button onclick="showTool('chat',this)" class="active">Chat 🤖</button>
<button onclick="showTool('translate',this)">Translate 🌍</button>
<button onclick="showTool('blog',this)">Blog ✍️</button>
<button onclick="showTool('image',this)">Image 🔥</button>
<button onclick="showTool('seo',this)">SEO 🔎</button>
</header>

<!-- 🔗 SHARE -->
<div class="share">
<button onclick="shareWhatsApp()">WhatsApp</button>
<button onclick="shareFacebook()">Facebook</button>
<button onclick="shareTwitter()">Twitter</button>
<button onclick="copyLink()">Copy Link</button>
</div>

<!-- 🤖 CHAT -->
<div id="chat" class="tool active">
<h2>AI Chat + Voice 🤖🔊</h2>

<select id="chatLang">
<option value="auto">Auto</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="bn">Bengali</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="mr">Marathi</option>
<option value="ur">Urdu</option>
</select>

<div id="chatbox"></div>

<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>
<button onclick="stopSpeak()">🛑 Stop Voice</button>
</div>

<!-- 🌍 TRANSLATE -->
<div id="translate" class="tool">
<h2>Translate + Voice 🌍🔊</h2>

<select id="fromLang">
<option value="auto">Auto Detect</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="ru">Russian</option>
<option value="zh">Chinese</option>
<option value="ja">Japanese</option>
<option value="ar">Arabic</option>
<option value="bn">Bengali</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="mr">Marathi</option>
<option value="ur">Urdu</option>
</select>

<select id="toLang">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="ru">Russian</option>
<option value="zh">Chinese</option>
<option value="ja">Japanese</option>
<option value="ar">Arabic</option>
<option value="bn">Bengali</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="mr">Marathi</option>
<option value="ur">Urdu</option>
</select>

<textarea id="transText" placeholder="Enter text..."></textarea>
<button onclick="translate()">Translate</button>
<button onclick="stopSpeak()">🛑 Stop Voice</button>

<p id="transResult"></p>
</div>

<!-- ✍️ BLOG -->
<div id="blog" class="tool">
<h2>Blog Generator + Voice ✍️🔊</h2>

<input id="blogTopic" placeholder="Enter topic">

<select id="blogLang">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="bn">Bengali</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="mr">Marathi</option>
</select>

<button onclick="blog()">Generate</button>
<button onclick="stopSpeak()">🛑 Stop Voice</button>

<p id="blogResult"></p>
</div>

<!-- 🖼️ IMAGE TOOL -->
<div id="image" class="tool">
<h2>Image Editor 🔥</h2>

<input type="file" onchange="loadImage(event)">

<button onclick="rotateImage()">Rotate 🔄</button>
<button onclick="cropImage()">Crop ✂️</button>
<button onclick="applyEffect('grayscale')">Grayscale</button>
<button onclick="applyEffect('blur')">Blur</button>
<button onclick="applyEffect('brightness')">Bright</button>

<canvas id="canvas"></canvas>
</div>

<!-- 🔎 SEO TOOL -->
<div id="seo" class="tool">
<h2>SEO Generator 🔎</h2>

<input id="title" placeholder="Enter Title">
<textarea id="desc" placeholder="Enter Description"></textarea>

<button onclick="seo()">Generate</button>

<p id="seoResult"></p>
</div>

<script src="script.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8334252996051264"
     crossorigin="anonymous"></script>
<ins class="adsbygoogle"
     style="display:block"
     data-ad-format="autorelaxed"
     data-ad-client="ca-pub-8334252996051264"
     data-ad-slot="4642297677"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
</body>
</html>
