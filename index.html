<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-box {
      width: 360px;
      height: 500px;
      background: #1e1e1e;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,255,120,0.3);
      position: relative;
    }

    /* 🔥 Animated AI Avatar */
    .avatar {
      width: 100%;
      height: 120px;
      background: radial-gradient(circle,#00c853,#0f0f0f);
      display: flex;
      justify-content: center;
      align-items: center;
      animation: pulse 2s infinite;
    }

    .avatar span {
      font-size: 40px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 10px #00c853; }
      50% { box-shadow: 0 0 30px #00c853; }
      100% { box-shadow: 0 0 10px #00c853; }
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .input-box {
      display: flex;
      border-top: 1px solid #333;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px;
      background: #00c853;
      border: none;
      color: white;
      cursor: pointer;
    }

    .msg {
      margin: 5px 0;
    }
  </style>
</head>

<body>

<div class="chat-box">

  <!-- 🔥 Animated AI Avatar -->
  <div class="avatar">
    <span>🤖 AI</span>
  </div>

  <div id="chat"></div>

  <div class="input-box">
    <input id="input" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
