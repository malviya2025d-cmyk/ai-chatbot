<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Tools Hub Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff}

header{display:flex;gap:5px;padding:10px;background:#111}
header button{flex:1;padding:10px;background:#00c853;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer}

.container{padding:10px}
.tool{display:none;background:#1e1e1e;padding:15px;border-radius:10px}
.active{display:block}

input,textarea,select{
width:100%;padding:10px;margin-top:10px;border-radius:6px;border:none
}

#chatbox{
height:400px;overflow-y:auto;background:#0f0f0f;padding:10px;border-radius:10px;
border:2px solid transparent;
background-image:linear-gradient(#0f0f0f,#0f0f0f),
linear-gradient(45deg,#00ffcc,#00c853,#00ffcc);
background-origin:border-box;
background-clip:padding-box,border-box;
animation:glow 3s linear infinite;
}

@keyframes glow{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(360deg)}
}

.msg{
padding:10px;margin:5px 0;border-radius:10px;max-width:80%;
animation:fadeUp 0.3s ease
}

.user{background:#00c853;color:#000;margin-left:auto}
.bot{background:#333}

@keyframes fadeUp{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

#loadingPopup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;padding:20px 30px;border-radius:10px;
display:none;color:#00ffcc;font-weight:bold;
box-shadow:0 0 20px #00ffcc;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:0.5}
50%{opacity:1}
100%{opacity:0.5}
}

.typing{display:flex;gap:5px;padding:10px}
.typing span{
width:8px;height:8px;background:#00ffcc;border-radius:50%;
animation:blink 1.5s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}

@keyframes blink{
0%,100%{opacity:0.2}
50%{opacity:1}
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px #00ffcc;
}
</style>
</head>

<body>

<header>
<button onclick="show('chat')">Chat</button>
<button onclick="show('trans')">Translate</button>
</header>

<div id="loadingPopup">🔍 AI is thinking...</div>

<div class="container">

<!-- CHAT -->
<div id="chat" class="tool active">
<h2>AI Chat</h2>

<select id="lang">
<option value="auto">Auto</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
</select>

<div id="chatbox"></div>

<input id="input" placeholder="Type message...">

<button onclick="sendChat()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>
<button onclick="stopVoice()">⛔ Stop</button>

</div>

<!-- TRANSLATE -->
<div id="trans" class="tool">
<h2>Translate</h2>

<input id="text" placeholder="Type text">

<select id="lang2">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="mr">Marathi</option>
<option value="pa">Punjabi</option>
<option value="or">Odia</option>
<option value="bn">Bengali</option>
<option value="gu">Gujarati</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="kn">Kannada</option>
<option value="ml">Malayalam</option>
<option value="ur">Urdu</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="ru">Russian</option>
<option value="zh">Chinese</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="ar">Arabic</option>
<option value="pt">Portuguese</option>
</select>

<button onclick="translateText()">Translate</button>

<hr>

<h3>📸 Image / Camera Translate</h3>
<input type="file" accept="image/*" capture="camera" onchange="readImage(event)">
<p id="ocrText"></p>

<div id="out"></div>
</div>

</div>

<script>

/* TOOL SWITCH */
function show(id){
document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* MEMORY LOAD */
let history = JSON.parse(localStorage.getItem("chatHistory") || "[]");

function loadHistory(){
history.forEach(msg=>{
document.getElementById("chatbox").innerHTML+=`<div class="msg ${msg.type}">${msg.text}</div>`;
});
}
loadHistory();

/* CHAT */
async function sendChat(){

let text=document.getElementById("input").value;
if(!text) return;

document.getElementById("chatbox").innerHTML+=`<div class="msg user">${text}</div>`;
history.push({type:"user",text});
localStorage.setItem("chatHistory",JSON.stringify(history));

document.getElementById("input").value="";

document.getElementById("loadingPopup").style.display="block";

let typingId="typing"+Date.now();
document.getElementById("chatbox").innerHTML+=`
<div id="${typingId}" class="msg bot">
<div class="typing"><span></span><span></span><span></span></div>
</div>`;

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
prompt:text,
lang:document.getElementById("lang").value
})
});

let d=await res.json();

document.getElementById(typingId).remove();
document.getElementById("loadingPopup").style.display="none";

document.getElementById("chatbox").innerHTML+=`<div class="msg bot">${d.reply}</div>`;
history.push({type:"bot",text:d.reply});
localStorage.setItem("chatHistory",JSON.stringify(history));

speak(d.reply);
}

/* VOICE INPUT */
let recognition;

function startVoice(){
if(!('webkitSpeechRecognition' in window)){
alert("Voice not supported");
return;
}

recognition = new webkitSpeechRecognition();
recognition.lang = "en-IN";
recognition.onresult = function(e){
let t=e.results[0][0].transcript;
document.getElementById("input").value=t;
sendChat();
};
recognition.start();
}

function stopVoice(){
if(recognition) recognition.stop();
}

/* VOICE OUTPUT */
function speak(text){
let s=new SpeechSynthesisUtterance(text);
s.lang="en-US";
window.speechSynthesis.speak(s);
}

/* TRANSLATE */
async function translateText(){
let t=document.getElementById("text").value;
let l=document.getElementById("lang2").value;

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
prompt:`Translate to ${l}: ${t}`
})
});

let d=await res.json();
document.getElementById("out").innerHTML=d.reply;
}

/* OCR */
async function readImage(e){
const file=e.target.files[0];
if(!file) return;

document.getElementById("ocrText").innerText="Reading image...";

const result=await Tesseract.recognize(file,"eng+hin");
const text=result.data.text;

document.getElementById("ocrText").innerText=text;

let lang=document.getElementById("lang2").value;

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
prompt:`Translate to ${lang}: ${text}`
})
});

let d=await res.json();
document.getElementById("out").innerHTML=d.reply;
}

</script>

</body>
</html>
