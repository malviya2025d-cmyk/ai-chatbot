<!DOCTYPE html>
<html>
<head>
<title>AI Tools Hub</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:#fff;
}

/* HEADER */
header{
display:flex;
flex-wrap:wrap;
padding:10px;
background:#111;
}

header button{
margin:3px;
padding:10px;
border:none;
background:#222;
color:#fff;
border-radius:6px;
cursor:pointer;
}

/* CONTAINER */
.container{
padding:10px;
}

/* TOOLS */
.tool{
display:none;
background:#1a1a1a;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.tool.active{
display:block;
}

/* CHAT */
#chatbox{
height:350px;
overflow-y:auto;
background:#000;
padding:10px;
border-radius:10px;
}

.msg{
padding:10px;
margin:5px;
border-radius:10px;
max-width:80%;
}

.user{
background:#007bff;
margin-left:auto;
}

.bot{
background:#333;
}

/* INPUT */
input, textarea{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
}

button.send{
background:#00c3ff;
color:#000;
margin-top:5px;
}

/* MOBILE */
@media (max-width:768px){
.tool{display:block !important;}
}

</style>
</head>

<body>

<header>
<button onclick="showTool('chat')">Chat</button>
<button onclick="showTool('translate')">Translate</button>
<button onclick="showTool('blog')">Blog</button>
<button onclick="showTool('image')">Image</button>
<button onclick="showTool('pdf')">PDF</button>
<button onclick="showTool('seo')">🔥 SEO</button>
</header>

<div class="container">

<!-- CHAT -->
<div id="chat" class="tool active">
<h2>Chat Bot</h2>
<div id="chatbox"></div>
<input id="msg" placeholder="Type...">
<button class="send" onclick="send()">Send</button>
</div>

<!-- TRANSLATE -->
<div id="translate" class="tool">
<h2>Translate</h2>
<textarea id="transText"></textarea>
<button onclick="translate()">Translate</button>
<p id="transResult"></p>
</div>

<!-- BLOG -->
<div id="blog" class="tool">
<h2>Blog Generator</h2>
<input id="blogTopic" placeholder="Enter topic">
<button onclick="blog()">Generate</button>
<p id="blogResult"></p>
</div>

<!-- IMAGE -->
<div id="image" class="tool">
<h2>Image Tool</h2>
<input type="file">
<p>Coming Soon: Effects 🔥</p>
</div>

<!-- PDF -->
<div id="pdf" class="tool">
<h2>PDF Tool</h2>
<input type="file">
<p>Coming Soon: PDF Scan / Convert</p>
</div>

<!-- SEO TOOL -->
<div id="seo" class="tool">
<h2>🔥 YouTube / FB SEO Tool</h2>

<input id="title" placeholder="Video/Post Title">
<textarea id="desc" placeholder="Description"></textarea>

<button onclick="seo()">Generate SEO</button>

<p id="seoResult"></p>
</div>

</div>

<script>

/* TOOL SWITCH */
function showTool(id){
document.querySelectorAll(".tool").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* CHAT */
async function send(){
let msg = document.getElementById("msg").value;

let box = document.getElementById("chatbox");

box.innerHTML += `<div class="msg user">${msg}</div>`;

document.getElementById("msg").value = "";

let res = await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:msg})
});

let data = await res.json();

box.innerHTML += `<div class="msg bot">🤖 ${data.reply}</div>`;

box.scrollTop = box.scrollHeight;
}

/* TRANSLATE */
function translate(){
let text = document.getElementById("transText").value;
document.getElementById("transResult").innerText = "Translated: " + text;
}

/* BLOG */
function blog(){
let topic = document.getElementById("blogTopic").value;
document.getElementById("blogResult").innerText = "Blog on: " + topic;
}

/* SEO TOOL */
function seo(){
let title = document.getElementById("title").value;

let result = `
🔥 Title:
${title} | Best Tips 2026

📄 Description:
This video/post is about ${title}. Watch now and learn amazing tips.

🏷️ Hashtags:
#${title.replaceAll(" ","")} #viral #trending #2026

🔑 Tags:
${title}, viral, trending, tips, seo
`;

document.getElementById("seoResult").innerText = result;
}

</script>

</body>
</html>
