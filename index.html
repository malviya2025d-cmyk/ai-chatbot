<!DOCTYPE html>
<html>
<head>

<title>AI Tools Hub Pro - Free AI Chat, Blog, Translate, PDF & Image Tools</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Free AI Tools Hub - Chat AI, Blog Generator, Image Editor, PDF Tools and Translate AI. Best free online SaaS platform.">
<meta name="keywords" content="free ai tools, ai chat, blog generator ai, image editor online, pdf tools, translate ai, seo tools">

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8334252996051264"
crossorigin="anonymous"></script>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff;}
header{display:flex;flex-wrap:wrap;gap:8px;padding:10px;background:#111;position:sticky;top:0;z-index:999;}
header button{flex:1;min-width:120px;padding:10px;border:none;background:#00c853;font-weight:bold;border-radius:6px;cursor:pointer;}
.container{padding:10px;}
.tool{display:none;background:#1e1e1e;padding:15px;border-radius:10px;}
.active{display:block;}
input,textarea,select{width:100%;padding:10px;margin-top:10px;border-radius:6px;border:none;outline:none;}
button{width:100%;padding:10px;margin-top:10px;background:#00c853;border:none;border-radius:6px;font-weight:bold;cursor:pointer;}
#chatbox{height:300px;overflow:auto;background:#000;padding:10px;border-radius:10px;display:flex;flex-direction:column;gap:8px;}
.msg{padding:10px;border-radius:10px;max-width:75%;}
.user{background:#00c853;color:#000;align-self:flex-end;}
.bot{background:#333;}
.ad{background:#222;padding:10px;margin:10px 0;text-align:center;color:#aaa;}
</style>

</head>

<body>

<header>
<button onclick="show('chat')">🤖 Chat</button>
<button onclick="show('blog')">✍️ Blog</button>
<button onclick="show('trans')">🌍 Translate</button>
<button onclick="show('pdf')">📄 PDF</button>
<button onclick="show('img')">🎨 Image</button>
</header>

<div class="container">

<div class="ad">🔝 Ad Space</div>

<!-- CHAT -->
<div id="chat" class="tool active">
<h2>AI Chat</h2>
<div id="chatbox"></div>
<input id="input" placeholder="Type message..." />
<button onclick="sendChat()">Send</button>
</div>

<div class="ad">💰 Ad Space</div>

<!-- BLOG -->
<div id="blog" class="tool">
<h2>Blog Generator</h2>
<input id="blogInput" placeholder="Topic..." />
<button onclick="generateBlog()">Generate</button>
<div id="blogOut"></div>
</div>

<!-- TRANSLATE -->
<div id="trans" class="tool">
<h2>Translate AI</h2>
<input id="text" placeholder="Text..." />
<select id="lang">
<option>en</option><option>hi</option><option>es</option><option>fr</option>
</select>
<button onclick="translateText()">Translate</button>
<div id="out"></div>
</div>

<!-- PDF -->
<div id="pdf" class="tool">
<h2>PDF Tool</h2>
<textarea id="pdfText"></textarea>
<button onclick="makePDF()">Download PDF</button>
</div>

<!-- IMAGE -->
<div id="img" class="tool">
<h2>Image Tool</h2>
<input type="file" onchange="loadImg(event)">
<canvas id="c"></canvas>
<button onclick="gray()">Grayscale</button>
</div>

<div class="ad">📊 Footer Ad</div>

</div>

<script>

/* SWITCH */
function show(id){
document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* CHAT */
async function sendChat(){
let text=document.getElementById("input").value;
if(!text)return;

chatbox.innerHTML+=`<div class="msg user">${text}</div>`;

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:text})
});

let data=await res.json();
chatbox.innerHTML+=`<div class="msg bot">${data.reply}</div>`;
}

/* BLOG */
async function generateBlog(){
let t=document.getElementById("blogInput").value;

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:"SEO blog: "+t})
});

let data=await res.json();
document.getElementById("blogOut").innerHTML=data.reply;
}

/* TRANSLATE */
async function translateText(){
let t=document.getElementById("text").value;
let l=document.getElementById("lang").value;

let res=await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:`Translate to ${l}: ${t}`})
});

let data=await res.json();
document.getElementById("out").innerHTML=data.reply;
}

/* PDF */
function makePDF(){
let t=document.getElementById("pdfText").value;
let b=new Blob([t],{type:"application/pdf"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="file.pdf";
a.click();
}

/* IMAGE */
let c=document.getElementById("c");
let ctx=c.getContext("2d");
let img=new Image();

function loadImg(e){
let r=new FileReader();
r.onload=()=>{img.src=r.result};
img.onload=()=>{c.width=300;c.height=300;ctx.drawImage(img,0,0,300,300);}
r.readAsDataURL(e.target.files[0]);
}

function gray(){
let d=ctx.getImageData(0,0,c.width,c.height);
let a=d.data;
for(let i=0;i<a.length;i+=4){
let g=(a[i]+a[i+1]+a[i+2])/3;
a[i]=a[i+1]=a[i+2]=g;
}
ctx.putImageData(d,0,0);
}

</script>

</body>
</html>
