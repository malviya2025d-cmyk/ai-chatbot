<!DOCTYPE html>
<html>
<head>
  <title>AI Chat + Canva Editor</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    /* TOP BAR */
    .topbar {
      background: #111;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      position: sticky;
      top: 0;
    }

    button {
      padding: 10px 15px;
      border: none;
      cursor: pointer;
      background: #00c853;
      color: black;
      font-weight: bold;
      border-radius: 6px;
    }

    .container {
      padding: 20px;
    }

    .box {
      display: none;
    }

    .active {
      display: block;
    }

    /* CHAT */
    #chatbox {
      height: 300px;
      overflow-y: auto;
      background: #1e1e1e;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      outline: none;
    }

    /* CANVA */
    canvas {
      max-width: 100%;
      background: #111;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- TOP BUTTONS -->
<div class="topbar">
  <button onclick="show('chat')">🤖 AI Chat</button>
  <button onclick="show('editor')">🎨 Canva Editor</button>
</div>

<div class="container">

  <!-- CHAT BOX -->
  <div id="chat" class="box active">
    <h2>🤖 AI Chatbot</h2>

    <select id="lang">
      <option value="auto">Auto</option>
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
    </select>

    <div id="chatbox"></div>

    <input id="input" placeholder="Ask something..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <!-- CANVA EDITOR -->
  <div id="editor" class="box">
    <h2>🎨 Canva Style Editor (Free)</h2>

    <input type="file" onchange="loadImage(event)" />

    <br><br>

    <canvas id="canvas"></canvas>

    <br>

    <button onclick="gray()">Grayscale</button>
    <button onclick="blurImg()">Blur</button>
    <button onclick="bright()">Brightness</button>
    <button onclick="bg()">Background</button>
    <button onclick="resetImg()">Reset</button>
    <button onclick="downloadImg()">Download</button>
  </div>

</div>

<script>

/* PAGE SWITCH */
function show(id) {
  document.querySelectorAll('.box').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ================= CHAT ================= */
async function sendMessage() {
  const input = document.getElementById("input").value;
  const chatbox = document.getElementById("chatbox");
  const lang = document.getElementById("lang").value;

  if (!input) return;

  chatbox.innerHTML += `<p><b>You:</b> ${input}</p>`;

  const res = await fetch("/api/ai", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt: input, lang })
  });

  const data = await res.json();

  chatbox.innerHTML += `<p><b>Bot:</b> ${data.reply}</p>`;
}

/* ================= CANVA ================= */
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let img = new Image();
let original = null;

/* LOAD */
function loadImage(event) {
  const reader = new FileReader();

  reader.onload = function() {
    img = new Image();

    img.onload = function() {
      canvas.width = 350;
      canvas.height = 350;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      original = ctx.getImageData(0, 0, canvas.width, canvas.height);
    };

    img.src = reader.result;
  };

  reader.readAsDataURL(event.target.files[0]);
}

/* RESET */
function resetImg() {
  ctx.putImageData(original, 0, 0);
}

/* GRAY */
function gray() {
  let d = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = d.data;

  for (let i=0;i<data.length;i+=4) {
    let avg = (data[i]+data[i+1]+data[i+2])/3;
    data[i]=data[i+1]=data[i+2]=avg;
  }

  ctx.putImageData(d,0,0);
}

/* BLUR */
function blurImg() {
  ctx.filter = "blur(3px)";
  ctx.drawImage(canvas,0,0);
  ctx.filter = "none";
}

/* BRIGHT */
function bright() {
  ctx.filter = "brightness(1.5)";
  ctx.drawImage(canvas,0,0);
  ctx.filter = "none";
}

/* BACKGROUND */
function bg() {
  let g = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  g.addColorStop(0,"#00c853");
  g.addColorStop(1,"#2196f3");

  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0,canvas.width,canvas.height);
}

/* DOWNLOAD */
function downloadImg() {
  const a = document.createElement("a");
  a.download = "canvas.png";
  a.href = canvas.toDataURL();
  a.click();
}

</script>

</body>
</html>
