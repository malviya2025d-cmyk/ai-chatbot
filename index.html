<!DOCTYPE html>
<html>
<head>
  <title>AI Tools Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    /* TOP MENU */
    .top {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #111;
      position: sticky;
      top: 0;
    }

    .top button {
      padding: 10px;
      border: none;
      background: #00c853;
      cursor: pointer;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .tool {
      display: none;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
    }

    .active {
      display: block;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      background: #00c853;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    canvas {
      max-width: 100%;
      margin-top: 10px;
      background: #111;
    }
  </style>
</head>

<body>

<!-- MENU -->
<div class="top">
  <button onclick="show('chat')">🤖 AI Chat</button>
  <button onclick="show('canva')">🎨 Image Editor</button>
  <button onclick="show('pdf')">📄 PDF Tool</button>
  <button onclick="show('blog')">✍️ Blog AI</button>
</div>

<div class="container">

<!-- CHAT TOOL -->
<div id="chat" class="tool active">
  <h2>🤖 AI Chat Tool</h2>

  <select id="lang">
    <option value="auto">Auto</option>
    <option value="en">English</option>
    <option value="hi">Hindi</option>
    <option value="es">Spanish</option>
  </select>

  <div id="chatbox"></div>

  <input id="input" placeholder="Ask AI..." />
  <button onclick="sendChat()">Send</button>
</div>

<!-- CANVA TOOL -->
<div id="canva" class="tool">
  <h2>🎨 Image Editor Tool</h2>

  <input type="file" onchange="loadImage(event)" />
  <canvas id="canvas"></canvas>

  <button onclick="gray()">Grayscale</button>
  <button onclick="blurImg()">Blur</button>
  <button onclick="bg()">Background</button>
  <button onclick="downloadImg()">Download</button>
</div>

<!-- PDF TOOL -->
<div id="pdf" class="tool">
  <h2>📄 PDF Tool</h2>

  <textarea id="pdfText" rows="6" placeholder="Write text..."></textarea>
  <button onclick="downloadPDF()">Download PDF</button>
</div>

<!-- BLOG TOOL -->
<div id="blog" class="tool">
  <h2>✍️ Blog AI Tool</h2>

  <input id="blogInput" placeholder="Enter topic..." />
  <button onclick="generateBlog()">Generate</button>

  <div id="blogOut"></div>
</div>

</div>

<script>

/* SWITCH TOOLS */
function show(id) {
  document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ================= AI CHAT ================= */
async function sendChat() {
  const input = document.getElementById("input").value;
  const chatbox = document.getElementById("chatbox");
  const lang = document.getElementById("lang").value;

  if (!input) return;

  chatbox.innerHTML += `<p><b>You:</b> ${input}</p>`;

  const res = await fetch("/api/ai", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt: input, lang })
  });

  const data = await res.json();

  chatbox.innerHTML += `<p><b>Bot:</b> ${data.reply}</p>`;
}

/* ================= CANVA ================= */
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let img = new Image();
let original = null;

function loadImage(event) {
  const reader = new FileReader();

  reader.onload = function() {
    img = new Image();
    img.onload = function() {
      canvas.width = 300;
      canvas.height = 300;
      ctx.drawImage(img, 0, 0, 300, 300);
      original = ctx.getImageData(0,0,300,300);
    };
    img.src = reader.result;
  };

  reader.readAsDataURL(event.target.files[0]);
}

function gray() {
  let d = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = d.data;

  for(let i=0;i<data.length;i+=4){
    let avg = (data[i]+data[i+1]+data[i+2])/3;
    data[i]=data[i+1]=data[i+2]=avg;
  }
  ctx.putImageData(d,0,0);
}

function blurImg() {
  ctx.filter="blur(3px)";
  ctx.drawImage(canvas,0,0);
  ctx.filter="none";
}

function bg() {
  let g = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  g.addColorStop(0,"#00c853");
  g.addColorStop(1,"#2196f3");

  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0,300,300);
}

function downloadImg() {
  const a = document.createElement("a");
  a.href = canvas.toDataURL();
  a.download = "image.png";
  a.click();
}

/* ================= PDF ================= */
function downloadPDF() {
  const text = document.getElementById("pdfText").value;
  const blob = new Blob([text], {type:"application/pdf"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "file.pdf";
  a.click();
}

/* ================= BLOG ================= */
async function generateBlog() {
  const topic = document.getElementById("blogInput").value;

  const res = await fetch("/api/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ prompt: "Write SEO blog on: "+topic })
  });

  const data = await res.json();

  document.getElementById("blogOut").innerHTML = data.reply;
}

</script>

</body>
</html>
