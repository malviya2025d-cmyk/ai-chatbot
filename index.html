<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Tools Hub Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:sans-serif;
color:#fff;
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bgMove 10s infinite;
}
@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* LOADER */
#loader{
position:fixed;
width:100%;height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}
.loader-face{
font-size:50px;
animation:jump 1s infinite;
}
@keyframes jump{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-20px)}
}

/* HEADER */
header{display:flex;flex-wrap:wrap;background:rgba(0,0,0,0.7)}
header button{
flex:1;padding:10px;border:none;background:transparent;color:#fff;
cursor:pointer;transition:.3s
}
header button:hover{
background:#00c3ff;color:#000;transform:scale(1.1)
}
header button.active{background:#00c3ff;color:#000}

.tool{display:none;padding:15px}
.tool.active{display:block}

/* CHAT */
#chatbox{
height:300px;overflow:auto;
background:rgba(0,0,0,0.5);
padding:10px;border-radius:10px
}
.msg{padding:8px;margin:5px;border-radius:10px}
.user{background:#0084ff;text-align:right}
.bot{background:#333}

/* INPUT */
input,textarea,select{
width:100%;padding:10px;margin-top:5px;border:none;border-radius:8px
}

/* BUTTON */
button{
padding:10px;margin-top:5px;border:none;border-radius:8px;
background:#00c3ff;color:#000;cursor:pointer
}
button:hover{background:#00ffe0}

/* IMAGE */
canvas{width:100%;margin-top:10px;border-radius:10px}

/* PROGRESS */
#progress{width:100%;background:#222;border-radius:10px;overflow:hidden;display:none}
#bar{width:0;height:10px;background:#00c3ff}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="loader-face">🤖</div>
<p>Loading AI...</p>
</div>

<header>
<button onclick="showTool('chat',this)" class="active">Chat 🤖</button>
<button onclick="showTool('translate',this)">Translate 🌍</button>
<button onclick="showTool('image',this)">Image 🔥</button>
</header>

<!-- CHAT -->
<div id="chat" class="tool active">
<h2>AI Chat</h2>
<div id="chatbox"></div>
<input id="msg" placeholder="Type message..." onkeypress="enterSend(event)">
<button onclick="send()">Send</button>
</div>

<!-- TRANSLATE -->
<div id="translate" class="tool">
<h2>Translator</h2>

<select id="toLang">
<option value="hi">Hindi</option>
<option value="en">English</option>
<option value="bn">Bengali</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="mr">Marathi</option>
<option value="gu">Gujarati</option>
<option value="pa">Punjabi</option>
<option value="ur">Urdu</option>
</select>

<textarea id="transText" placeholder="Enter text"></textarea>
<button onclick="translateText()">Translate</button>

<p id="transResult"></p>
</div>

<!-- IMAGE TOOL -->
<div id="image" class="tool">
<h2>Image Editor 🔥</h2>

<input type="file" onchange="loadImage(event)">

<button onclick="applyEffect('grayscale')">Grayscale</button>
<button onclick="applyEffect('invert')">Invert</button>
<button onclick="applyEffect('sepia')">Sepia</button>
<button onclick="applyEffect('blur')">Blur</button>
<button onclick="applyEffect('brightness')">Bright</button>
<button onclick="applyEffect('contrast')">Contrast</button>
<button onclick="applyEffect('saturate')">Saturate</button>
<button onclick="applyEffect('hue')">Hue</button>
<button onclick="applyEffect('shadow')">Shadow</button>
<button onclick="applyEffect('reset')">Reset</button>

<canvas id="canvas"></canvas>

<button onclick="downloadImage()">Download</button>

<div id="progress"><div id="bar"></div></div>
</div>

<script>

/* LOADER */
setTimeout(()=>{loader.style.display="none"},2000);

/* TOOL SWITCH */
function showTool(id,btn){
document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('header button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

/* ENTER KEY */
function enterSend(e){ if(e.key==="Enter") send(); }

/* CHAT */
function send(){
let msg=msgInput.value;
if(!msg) return;

chatbox.innerHTML+=`<div class="msg user">🧑 ${msg}</div>`;

setTimeout(()=>{
chatbox.innerHTML+=`<div class="msg bot">🤖 ${msg} 😊</div>`;
chatbox.scrollTop=chatbox.scrollHeight;
},500);

msgInput.value="";
}

/* TRANSLATE */
function translateText(){
let t=transText.value;
let lang=toLang.value;
transResult.innerText="🌍 ["+lang+"] → "+t;
}

/* IMAGE */
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let img=new Image();
let filter="none";

function loadImage(e){
img.src=URL.createObjectURL(e.target.files[0]);
img.onload=()=>{
canvas.width=img.width;
canvas.height=img.height;
draw();
}
}

function draw(){
ctx.filter=filter;
ctx.drawImage(img,0,0);
}

function applyEffect(type){
switch(type){
case "grayscale": filter="grayscale(100%)"; break;
case "invert": filter="invert(100%)"; break;
case "sepia": filter="sepia(100%)"; break;
case "blur": filter="blur(5px)"; break;
case "brightness": filter="brightness(150%)"; break;
case "contrast": filter="contrast(200%)"; break;
case "saturate": filter="saturate(200%)"; break;
case "hue": filter="hue-rotate(90deg)"; break;
case "shadow": filter="drop-shadow(10px 10px 10px black)"; break;
case "reset": filter="none"; break;
}
draw();
}

/* DOWNLOAD */
function downloadImage(){
let bar=document.getElementById("bar");
let prog=document.getElementById("progress");
prog.style.display="block";

let w=0;
let i=setInterval(()=>{
w+=10;
bar.style.width=w+"%";
if(w>=100){
clearInterval(i);
let link=document.createElement('a');
link.download="image.png";
link.href=canvas.toDataURL();
link.click();
prog.style.display="none";
bar.style.width="0%";
}
},100);
}

</script>

</body>
</html>
