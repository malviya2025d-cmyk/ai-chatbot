<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Tools Hub Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff}

header{display:flex;gap:5px;padding:10px;background:#111}
header button{flex:1;padding:10px;background:#00c853;border:none;border-radius:6px;color:#000;font-weight:bold}

.container{padding:10px;width:100%;box-sizing:border-box}
.tool{display:none;background:#1e1e1e;padding:15px;border-radius:10px;overflow-x:auto}
.active{display:block}

input,button,select{
width:100%;padding:10px;margin-top:10px;border-radius:6px;border:none;font-size:16px
}

/* MOBILE FIX */
img, iframe, embed{max-width:100%;height:auto}

/* CHAT */
#chatbox{
height:400px;overflow-y:auto;background:#0f0f0f;padding:10px;border-radius:10px;
border:2px solid transparent;
background-image:linear-gradient(#0f0f0f,#0f0f0f),
linear-gradient(45deg,#00ffcc,#00c853,#00ffcc);
background-origin:border-box;
background-clip:padding-box,border-box;
animation:glow 3s linear infinite;
}

@keyframes glow{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(360deg)}
}

.msg{padding:10px;margin:5px 0;border-radius:10px;max-width:80%}
.user{background:#00c853;color:#000;margin-left:auto}
.bot{background:#1e1e1e;line-height:1.6}

/* FORMAT */
.bot h1,.bot h2{color:#00ffcc}
.bot ul{padding-left:20px}
.bot code{background:#000;padding:4px;border-radius:5px;color:#00ffcc}

/* TYPING */
.typing{display:flex;gap:5px}
.typing span{
width:8px;height:8px;background:#00ffcc;border-radius:50%;
animation:blink 1.5s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}

@keyframes blink{
0%,100%{opacity:0.2}
50%{opacity:1}
}

#loadingPopup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;padding:20px;border-radius:10px;
display:none;color:#00ffcc;
}
</style>
</head>

<body>

<header>
<button onclick="show('chat')">Chat</button>
<button onclick="show('trans')">Translate</button>
</header>

<div id="loadingPopup">🔍 AI is thinking...</div>

<div class="container">

<!-- CHAT -->
<div id="chat" class="tool active">
<h2>AI Chat</h2>

<select id="lang">
<option value="en">English</option>
<option value="hi">Hindi</option>
</select>

<div id="chatbox"></div>

<input id="input" placeholder="Type message...">

<button onclick="sendChat()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>
<button onclick="stopVoice()">⛔ Stop</button>
<button onclick="toggleVoice()">🔊 Voice ON/OFF</button>
</div>

<!-- TRANSLATE -->
<div id="trans" class="tool">
<h2>Translate</h2>

<input id="text" placeholder="Type text">

<select id="lang2">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="mr">Marathi</option>
<option value="pa">Punjabi</option>
<option value="bn">Bengali</option>
</select>

<button onclick="translateText()">Translate</button>

<hr>

<input type="file" accept="image/*" capture="environment" onchange="readImage(event)">
<p id="ocrText"></p>
<div id="out"></div>
</div>

</div>

<script>

/* SWITCH */
function show(id){
document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* FORMAT */
function formatReply(text){
return text.replace(/\n/g,"<br>");
}

/* MEMORY */
let history=JSON.parse(localStorage.getItem("chatHistory")||"[]");

function loadHistory(){
history.forEach(m=>{
chatbox.innerHTML+=`<div class="msg ${m.type}">${formatReply(m.text)}</div>`;
});
}
loadHistory();

/* VOICE CONTROL */
let speechOn=true;

function toggleVoice(){
speechOn=!speechOn;
alert("Voice: "+(speechOn?"ON":"OFF"));
}

function cleanText(t){
return t.replace(/[#*`>-]/g,"").replace(/\s+/g," ").trim();
}

function speak(text){
if(!speechOn) return;
speechSynthesis.cancel(); // STOP OLD
let s=new SpeechSynthesisUtterance(cleanText(text));
speechSynthesis.speak(s);
}

/* CHAT */
async function sendChat(){
let t=input.value.trim();
if(!t) return;

chatbox.innerHTML+=`<div class="msg user">${t}</div>`;
input.value="";
loadingPopup.style.display="block";

let id="t"+Date.now();
chatbox.innerHTML+=`<div id="${id}" class="msg bot"><div class="typing"><span></span><span></span><span></span></div></div>`;

let res=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:t,lang:lang.value})});

let d=await res.json();

document.getElementById(id).remove();
loadingPopup.style.display="none";

chatbox.innerHTML+=`<div class="msg bot">${formatReply(d.reply)}</div>`;

history.push({type:"user",text:t});
history.push({type:"bot",text:d.reply});
localStorage.setItem("chatHistory",JSON.stringify(history));

speak(d.reply);
}

/* ENTER FIX */
input.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault();sendChat();
}
});

text.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();translateText();
}
});

/* VOICE INPUT */
let recognition;
function startVoice(){
recognition=new webkitSpeechRecognition();
recognition.onresult=e=>{
input.value=e.results[0][0].transcript;
sendChat();
};
recognition.start();
}
function stopVoice(){if(recognition)recognition.stop();}

/* TRANSLATE */
async function translateText(){
let t=text.value;
let l=lang2.value;

let res=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:`Translate to ${l}: ${t}`})});

let d=await res.json();
out.innerHTML=d.reply;
}

/* OCR */
async function readImage(e){
let f=e.target.files[0];
let r=await Tesseract.recognize(f,"eng+hin");
ocrText.innerText=r.data.text;

let res=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:`Translate: ${r.data.text}`})});

let d=await res.json();
out.innerHTML=d.reply;
}

</script>

</body>
</html>
